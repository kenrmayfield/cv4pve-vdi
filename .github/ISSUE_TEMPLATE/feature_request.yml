name: ✨ Feature Request
description: Suggest a new feature or enhancement for cv4pve-vdi
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: What would you like to see?
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      placeholder: How would this feature help you?
    validations:
      required: true
