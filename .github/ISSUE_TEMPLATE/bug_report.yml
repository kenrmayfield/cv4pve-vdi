name: 🐛 Bug Report
description: Report a bug or issue with cv4pve-vdi
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug! Please fill out the form below to help us investigate and fix the issue.

  - type: input
    id: version
    attributes:
      label: Version
      description: What version of cv4pve-vdi are you using?
      placeholder: "e.g., 1.0.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: On which OS are you running cv4pve-vdi?
      options:
        - Windows
        - Linux
        - macOS
    validations:
      required: true

  - type: input
    id: pve-version
    attributes:
      label: Proxmox VE Version
      description: What version of Proxmox VE are you connecting to?
      placeholder: "e.g., 8.3.2"
    validations:
      required: true

  - type: dropdown
    id: protocol
    attributes:
      label: Protocol
      description: Which protocol are you using when the bug occurs?
      options:
        - SPICE
        - RDP
        - Both
        - Not applicable
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Open cv4pve-vdi
        2. Connect to host '...'
        3. Click on '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened instead
      placeholder: What actually happened?
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Screenshots, logs, or any other context that might help
