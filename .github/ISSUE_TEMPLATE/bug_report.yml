name: 🐛 Bug Report
description: Report a bug or issue with cv4pve-vdi
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "e.g., 1.2.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - Linux
        - macOS
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. ...
        2. ...
        3. See error
    validations:
      required: true
